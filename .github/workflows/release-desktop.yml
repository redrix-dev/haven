# Desktop release — builds the Tauri app for each OS, signs the updater artifacts,
# and publishes a GitHub Release (with `latest.json`) that the in-app updater reads.
#
# Trigger: push a tag like `desktop-v2.0.0` (see docs/RELEASE_CADENCE.md). The
# release is created as a DRAFT — review it, then publish. The updater endpoint
# (`releases/latest/download/latest.json`) only serves a published, non-prerelease
# release, so auto-update activates the moment you publish the draft.
#
# Shape: ONE `create-release` job makes the draft and emits its numeric id; the
# build matrix then uploads every platform's artifacts to THAT release id. This
# is deliberate — if each matrix job created the release itself (by tag), they
# race: GitHub's get-release-by-tag API doesn't return drafts, so concurrent jobs
# can't see each other's draft and end up creating duplicate releases with split,
# incomplete `latest.json` manifests. Creating once up front avoids that.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — minisign private key (`tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — its password ("" if none)
# The matching PUBLIC key lives in src-tauri/tauri.conf.json (`plugins.updater.pubkey`).
# The production keypair is wired; just ensure the two secrets above are set in the repo.
#
# Release notes: the body is read from docs/releases/<tag>.md when present (curate the
# SANITIZED PUBLIC test-signoff summary there — see docs/RELEASE_CADENCE.md). Never paste
# raw test-reports/ logs; they're internal. Falls back to a generic body if the file is absent.
#
# Not handled here (deliberate, tracked separately): OS code signing —
#   macOS notarization (Apple cert) and Windows Authenticode. Without them users
#   get a Gatekeeper/SmartScreen prompt on first install, and unsigned macOS
#   builds can hit Gatekeeper "damaged" errors on update. Updater (minisign)
#   signing above is independent of, and not a substitute for, OS code signing.

name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");
            const notesPath = `docs/releases/${tag}.md`;
            const body = fs.existsSync(notesPath)
              ? fs.readFileSync(notesPath, "utf8")
              : "Download an installer below. Existing installs update automatically once this release is published.";
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Haven ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/tauri/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      # Write the App Store Connect API key (.p8) to the standard notarytool
      # search path so tauri-action's notarization step finds it automatically.
      # notarytool searches: ~/.appstoreconnect/private_keys/AuthKey_KEYID.p8
      - name: Write App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8

      # Upload to the single release created above (by id, never by tag) so all
      # platforms land in one draft with one combined latest.json.
      - name: Build, sign, and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Inlined into the bundle at vite build time (getTauriSupabaseConfig).
          # Without these the packaged app throws at boot and hangs on the splash.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # macOS Developer ID signing + notarization via App Store Connect API key.
          # Certificate import is handled by tauri-action when these three are set.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # notarytool picks up the .p8 written above from its standard search path.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          projectPath: apps/tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
