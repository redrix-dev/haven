name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      # Never block on Corepack's interactive "download this manager?" prompt.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Honor the pinned npm from package.json's "packageManager" field so the
      # runner's npm matches contributors' (prevents lockfile drift across npm
      # versions). NOTE: bare `corepack enable` does NOT shim npm (it excludes
      # npm by design) -- `corepack enable npm` is required to replace it.
      - run: corepack enable npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - run: npm run setup:mobile
      - run: npm run mobile:ownership
      - run: npm run mobile:preflight
      - run: node tooling/scripts/mobile/run-in-mobile.mjs npx expo config --type public
      - name: Lockfile discipline
        run: git diff --exit-code -- package-lock.json apps/mobile/package-lock.json
      # Headless RN bundle smoke: runs the full Metro+Babel graph (JS-only, no
      # Xcode) so a broken import / missing module / total alias break fails CI
      # without a simulator. Placed before Supabase so mobile breakage fails fast.
      - name: Mobile bundle smoke
        run: npm run mobile:bundle
      - run: supabase start
      - run: npm run ci:verify
      - name: Stop Supabase
        if: always()
        run: supabase stop

  # Compile-check the native voice sidecar (its own Cargo workspace, pinned to
  # an unreleased libwebrtc — see docs/architecture/NATIVE_VOICE.md). Runs in
  # parallel with `verify`; --locked also proves haven-voice/Cargo.lock is sound.
  sidecar:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/tauri/haven-voice -> target"
      # cpal needs ALSA; webrtc-sys's prebuilt libwebrtc links the GTK/glib
      # desktop stack (glib-2.0, gio) at build time — same set the release
      # workflow installs before building the sidecar.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev
      - name: Build native voice sidecar
        run: cargo build --locked --manifest-path apps/tauri/haven-voice/Cargo.toml
