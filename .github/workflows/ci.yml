name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - run: npm run setup:mobile
      - run: npm run mobile:ownership
      - run: npm run mobile:preflight
      - run: node tooling/scripts/mobile/run-in-mobile.mjs npx expo config --type public
      - name: Lockfile discipline
        run: git diff --exit-code -- package-lock.json apps/mobile/package-lock.json
      - run: supabase start
      - run: npm run ci:verify
      - name: Stop Supabase
        if: always()
        run: supabase stop

