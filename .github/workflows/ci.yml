name: CI

# Parallel lanes, cheapest-first. `fast` (lint/typecheck/unit) and `mobile`
# (bundle smoke) run on every push/PR and give a red X in ~2-3 min for the
# common mistakes. The expensive `integration` lane (Supabase boot + reset +
# RLS/backend suites) only runs when the DB-layer input surface actually
# changed — see `detect-changes` below. `gate` is the single job to mark as the
# required status check: it passes only when fast+mobile are green and
# integration either passed or was legitimately skipped.
on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether the DB-layer suites need to run. The paths below are the
  # *true* input surface of test:db + test:backend (traced, not guessed):
  #   supabase/**            migrations, config, seed, and the tests/ helpers +
  #                          fixtures the SQL suite loads AND the backend
  #                          contract tests call (test_support.* lives in
  #                          supabase/tests/_helpers, NOT in migrations).
  #   packages/shared/**     the backend contract tests import @shared/lib/backend,
  #                          whose import graph reaches into shared.
  #   tooling/scripts/test   the suite runner scripts themselves.
  #   tooling/test-support   vitest setup + @test-support fixtures the tests use.
  #   vitest.config.ts       alias/setup resolution for the backend tests.
  #   package-lock.json      a dependency bump can change behavior.
  # Filtering narrower than this (e.g. supabase/migrations only) would let a
  # helper/fixture/shared edit skip the very tests that cover it — a false green.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            integration:
              - 'supabase/**'
              - 'packages/shared/**'
              - 'tooling/scripts/test/**'
              - 'tooling/test-support/**'
              - 'vitest.config.ts'
              - 'package-lock.json'

  fast:
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lockfile discipline
        run: git diff --exit-code -- package-lock.json apps/mobile/package-lock.json
      - run: npm run ci:fast

  mobile:
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npm run mobile:ownership
      - run: npm run mobile:preflight
      - run: node tooling/scripts/mobile/run-in-mobile.mjs npx expo config --type public
      # Headless RN bundle smoke (full Metro+Babel graph, JS-only, no Xcode):
      # catches broken imports / missing modules / alias breakage. Also runs
      # mobile:typecheck. Runs exactly once now (previously duplicated).
      - run: npm run ci:mobile

  integration:
    needs: detect-changes
    if: needs.detect-changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: supabase start
      - run: npm run ci:integration
      - name: Stop Supabase
        if: always()
        run: supabase stop

  # The required status check. Aggregates the lanes so a legitimately-skipped
  # integration lane doesn't leave the required check pending forever.
  gate:
    needs: [detect-changes, fast, mobile, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require lanes (integration may skip when no DB-layer change)
        run: |
          echo "fast=${{ needs.fast.result }}"
          echo "mobile=${{ needs.mobile.result }}"
          echo "integration=${{ needs.integration.result }} (db-layer changed=${{ needs.detect-changes.outputs.integration }})"
          fail=0
          [ "${{ needs.fast.result }}" = "success" ] || { echo "::error::fast lane failed"; fail=1; }
          [ "${{ needs.mobile.result }}" = "success" ] || { echo "::error::mobile lane failed"; fail=1; }
          case "${{ needs.integration.result }}" in
            success|skipped) ;;
            *) echo "::error::integration lane failed (${{ needs.integration.result }})"; fail=1 ;;
          esac
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "All required lanes green (integration: ${{ needs.integration.result }})."
