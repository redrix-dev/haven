<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Haven</title>
    <!-- Capture timestamp before ANY external script loads so bootLogger can
         measure the "window visible but blank" period (pre-bundle-eval time). -->
    <script>window.__havenBootT0 = performance.now();</script>
    <style>
      /* Inline styles so the window looks intentional during webpack compile.
         These are overridden once the JS bundle injects the real CSS. */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1626;
        color: #6b7280;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #haven-web-root { height: 100%; }
      #haven-boot-splash {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-size: 13px;
        letter-spacing: 0.02em;
        user-select: none;
        -webkit-user-select: none;
        /* Fade out once React mounts — React replaces #haven-web-root's
           children so this element disappears naturally. */
      }
    </style>
  </head>
  <body>
    <div id="haven-web-root">
      <div id="haven-boot-splash">Haven</div>
    </div>
  </body>
</html>
