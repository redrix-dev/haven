<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haven — UI Kit · Marketing Site</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  body { margin: 0; background: #0f1728; color: #e6edf7; font-family: var(--font-sans); }
  main { min-height: 100vh; }
  .footer-link { color: inherit; text-decoration: none; transition: color .15s; }
  .footer-link:hover { color: #fff; }
  a { color: inherit; }
  /* Section wrappers */
  .section { padding: 0 24px 96px; }
  .max-6xl { max-width: 1152px; margin: 0 auto; }
  .max-7xl { max-width: 1280px; margin: 0 auto; }
  .max-5xl { max-width: 1024px; margin: 0 auto; }
  .max-3xl { max-width: 768px; margin: 0 auto; }
  .max-2xl { max-width: 672px; margin: 0 auto; }
  .hero-section { position: relative; overflow: hidden; padding: 128px 24px 96px; }
  .hero-glow {
    pointer-events: none; position: absolute; left: 50%; top: 64px;
    transform: translateX(-50%); height: 420px; width: 760px; border-radius: 999px;
    background: rgba(63, 121, 216, 0.10); filter: blur(140px);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Icon.jsx"></script>
  <script type="text/babel" src="Button.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="ReleaseTitleCard.jsx"></script>
  <script type="text/babel" src="ScreenshotFrame.jsx"></script>
  <script type="text/babel" src="HonestSection.jsx"></script>
  <script type="text/babel" src="FeatureGrid.jsx"></script>
  <script type="text/babel" src="CTACard.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function Hero() {
      const I = window.Icon;
      const actions = (
        <>
          <window.Button variant="primary" size="lg" style={{ paddingLeft: 32, paddingRight: 32 }}>
            <I.Download /> Download for Windows
          </window.Button>
          <window.Button variant="outline" size="lg">Release Notes</window.Button>
          <window.Button variant="outline" size="lg">
            <I.ExternalLink /> Try it in browser
          </window.Button>
        </>
      );
      return (
        <window.ReleaseTitleCard
          badgeLabel="Public Release"
          eyebrow="Now Shipping"
          title="Public release"
          accent="now live."
          subtitle="Haven v1.7.1 is out with moderation infrastructure, routed reports, avatar uploads, markdown tools, and more. Download it now or read the full release notes."
          features={["Moderation infrastructure", "Avatar uploads", "Markdown tools", "Routed reports"]}
          footer="Haven v1.7.1"
          actions={actions}
        />
      );
    }

    function App() {
      return (
        <main>
          <window.Header />

          {/* Hero */}
          <section className="hero-section">
            <div className="hero-glow" />
            <div className="max-6xl" style={{ position: "relative" }}>
              <Hero />
            </div>
          </section>

          {/* Screenshot */}
          <section className="section max-7xl">
            <window.ScreenshotFrame
              label="Haven"
              src="../../assets/haven-app-screenshot.png"
              alt="Haven app screenshot"
            />
          </section>

          {/* Honest */}
          <section className="section max-3xl">
            <window.HonestSection />
          </section>

          {/* Features */}
          <section className="section max-5xl">
            <window.FeatureGrid />
          </section>

          {/* CTA */}
          <section className="section max-2xl">
            <window.CTACard />
          </section>

          <window.Footer />
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
