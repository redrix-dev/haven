<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Shadows & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 28px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .box { width: 100%; height: 76px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-lg); }
  .name { font-size: 11px; color: var(--fg2); font-weight: 600; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="item"><div class="box" style="box-shadow: var(--shadow-card);"></div><div class="name">shadow-card</div><div class="meta">cards, popovers</div></div>
      <div class="item"><div class="box" style="box-shadow: var(--shadow-screenshot);"></div><div class="name">shadow-screenshot</div><div class="meta">product shots</div></div>
      <div class="item"><div class="box" style="box-shadow: var(--shadow-hero);"></div><div class="name">shadow-hero</div><div class="meta">hero / release</div></div>
      <div class="item"><div class="box" style="box-shadow: var(--shadow-status-breathe-mid); border-color: var(--haven-blue);"></div><div class="name">status-breathe</div><div class="meta">primary glow</div></div>
    </div>
  </div>
</body>
</html>
