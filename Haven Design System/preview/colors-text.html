<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Color: Text</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 1fr 110px 90px; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border-default); }
  .specimen { font-size: 17px; font-weight: 500; }
  .name { font-size: 11px; color: var(--fg-eyebrow); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="specimen" style="color: var(--fg1);">The aa quick brown fox jumps</div><div class="name">fg1 / pure</div><div class="hex">#FFFFFF</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg2);">The aa quick brown fox jumps</div><div class="name">fg2 / body</div><div class="hex">#E6EDF7</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg3);">The aa quick brown fox jumps</div><div class="name">fg3</div><div class="hex">#D2DCEF</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg-muted);">The aa quick brown fox jumps</div><div class="name">muted</div><div class="hex">#A9B8CF</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg-dim);">The aa quick brown fox jumps</div><div class="name">dim</div><div class="hex">#8EA4C7</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg-eyebrow); text-transform: uppercase; letter-spacing: .18em; font-size: 13px;">eyebrow / overline</div><div class="name">eyebrow</div><div class="hex">#7F90AC</div></div>
    <div class="row"><div class="specimen" style="color: var(--fg-placeholder); font-style: italic;">Message #general</div><div class="name">placeholder</div><div class="hex">#8897B1</div></div>
  </div>
</body>
</html>
