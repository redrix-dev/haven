<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 84px; height: 84px; background: var(--bg-card); border: 1px solid var(--border-default); }
  .name { font-size: 11px; color: var(--fg2); font-weight: 600; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="item"><div class="box" style="border-radius: var(--radius-sm);"></div><div class="name">sm</div><div class="meta">6px</div></div>
      <div class="item"><div class="box" style="border-radius: var(--radius-md);"></div><div class="name">md</div><div class="meta">8px</div></div>
      <div class="item"><div class="box" style="border-radius: var(--radius);"></div><div class="name">base</div><div class="meta">10px</div></div>
      <div class="item"><div class="box" style="border-radius: var(--radius-xl);"></div><div class="name">xl</div><div class="meta">14px</div></div>
      <div class="item"><div class="box" style="border-radius: var(--radius-2xl);"></div><div class="name">2xl · tile</div><div class="meta">16px</div></div>
      <div class="item"><div class="box" style="border-radius: var(--radius-card-marketing);"></div><div class="name">card-mkt</div><div class="meta">28px</div></div>
    </div>
  </div>
</body>
</html>
