<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: .18em; color: var(--fg-eyebrow); margin-bottom: 4px; }

  .btn {
    font-family: inherit; font-size: 14px; font-weight: 600;
    border: 0; cursor: pointer; padding: 10px 18px;
    border-radius: var(--radius-pill);
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .15s, transform .1s, box-shadow .2s;
  }
  .btn-primary { background: var(--haven-blue); color: #fff; box-shadow: 0 0 0 0 rgba(63,121,216,0); }
  .btn-primary:hover { background: var(--haven-blue-hover); box-shadow: var(--shadow-status-breathe-mid); }
  .btn-secondary { background: var(--bg-card); color: var(--fg1); border: 1px solid var(--border-default); }
  .btn-secondary:hover { background: var(--bg-accent); }
  .btn-ghost { background: transparent; color: var(--fg2); }
  .btn-ghost:hover { background: var(--bg-muted); color: var(--fg1); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #9c3946; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }
  .btn-lg { padding: 14px 24px; font-size: 16px; }

  .arrow { width: 14px; height: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="label">Primary · Secondary · Ghost · Danger</div>
      <div class="row">
        <button class="btn btn-primary">Get Started <svg class="arrow" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="btn btn-secondary">Read the docs</button>
        <button class="btn btn-ghost">Cancel</button>
        <button class="btn btn-danger">Leave Community</button>
      </div>
    </div>
    <div>
      <div class="label">Sizes</div>
      <div class="row">
        <button class="btn btn-primary btn-sm">Join</button>
        <button class="btn btn-primary">Join Community</button>
        <button class="btn btn-primary btn-lg">Join the Haven</button>
      </div>
    </div>
  </div>
</body>
</html>
