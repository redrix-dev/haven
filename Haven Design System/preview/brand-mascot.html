<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Mascot</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 28px; box-sizing: border-box; display: grid; grid-template-columns: 320px 1fr; gap: 22px; align-items: center; }
  .stage {
    aspect-ratio: 1; border-radius: var(--radius-2xl);
    background:
      radial-gradient(circle at 30% 30%, rgba(63,121,216,.45), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(193,150,74,.18), transparent 65%),
      var(--bg-app-deep);
    display: grid; place-items: center;
    box-shadow: var(--shadow-hero);
    border: 1px solid var(--border-default);
  }
  .stage img { width: 78%; height: auto; filter: drop-shadow(0 12px 30px rgba(0,0,0,.45)); }
  .copy h3 { margin: 0 0 8px; font-size: 22px; font-weight: 700; color: var(--fg1); letter-spacing: -0.01em; }
  .copy p { margin: 0; font-size: 13.5px; color: var(--fg-muted); line-height: 1.6; }
  .palette { display: flex; gap: 8px; margin-top: 14px; }
  .swatch { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border-default); }
  .label { font-size: 10px; font-family: var(--font-mono); color: var(--fg-muted); margin-top: 4px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stage"><img src="../assets/haven-owl-512.png" alt="Haven horned owl mascot" /></div>
    <div class="copy">
      <h3>The horned owl</h3>
      <p>Haven's mascot. Watchful, calm, and a little stoic — pairs with the brand promise of privacy and quiet community. Use on dark, give it room to breathe, never recolor the silhouette.</p>
      <div class="palette">
        <div class="col"><div class="swatch" style="background: var(--haven-blue);"></div><div class="label">eyes</div></div>
        <div class="col"><div class="swatch" style="background: var(--accent-amber-strong);"></div><div class="label">beak</div></div>
        <div class="col"><div class="swatch" style="background: var(--bg-app-deep);"></div><div class="label">body</div></div>
      </div>
    </div>
  </div>
</body>
</html>
