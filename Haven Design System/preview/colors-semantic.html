<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Color: Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { border: 1px solid var(--border-default); border-radius: 12px; padding: 14px; background: var(--bg-card); display: flex; flex-direction: column; gap: 10px; }
  .label-row { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 999px; }
  .name { font-size: 12px; font-weight: 600; color: var(--fg2); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .demo { font-size: 12px; color: var(--fg-muted); }
  .demo .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }

  .section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .h { font-size: 11px; text-transform: uppercase; letter-spacing: .18em; color: var(--fg-eyebrow); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="h">Status (sidebar dots)</div>
      <div class="section">
        <div class="card">
          <div class="label-row"><span class="dot" style="background: var(--success-strong);"></span><span style="color: var(--success-strong); font-weight: 600;">Online</span></div>
          <div class="hex">#44B894</div>
        </div>
        <div class="card">
          <div class="label-row"><span class="dot" style="background: var(--warning-strong);"></span><span style="color: var(--warning-strong); font-weight: 600;">Away</span></div>
          <div class="hex">#F0A832</div>
        </div>
        <div class="card">
          <div class="label-row"><span class="dot" style="background: var(--danger-strong);"></span><span style="color: var(--danger-strong); font-weight: 600;">Do Not Disturb</span></div>
          <div class="hex">#F04747</div>
        </div>
      </div>
    </div>

    <div>
      <div class="h">Destructive · Notification · Staff</div>
      <div class="section">
        <div class="card">
          <span class="pill" style="background: var(--danger-bg); color: var(--danger-text); border: 1px solid rgba(183,74,86,.6);">BREAKING</span>
          <div class="hex">bg #4A1F2C · text #FCA5A5</div>
        </div>
        <div class="card">
          <div class="label-row"><span class="pill" style="background: var(--notification-pip); color: #fff; min-width: 18px; height: 18px; padding: 0 6px; justify-content: center;">12</span></div>
          <div class="hex">pip #D95C5C</div>
        </div>
        <div class="card">
          <div class="label-row"><span class="pill" style="background: var(--accent-staff-bg); color: var(--accent-staff); border: 1px solid rgba(63,121,216,.3);">STAFF</span></div>
          <div class="hex">bg rgba(63,121,216,.18) · text #59B7FF</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
