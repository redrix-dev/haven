<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px; align-items: center; padding: 7px 0; }
  .token { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .bar { height: 14px; background: var(--haven-blue); border-radius: 4px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-eyebrow); text-align: right; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="token">--space-1</div><div><div class="bar" style="width: var(--space-1);"></div></div><div class="px">4px</div></div>
    <div class="row"><div class="token">--space-2</div><div><div class="bar" style="width: var(--space-2);"></div></div><div class="px">8px</div></div>
    <div class="row"><div class="token">--space-3</div><div><div class="bar" style="width: var(--space-3);"></div></div><div class="px">12px</div></div>
    <div class="row"><div class="token">--space-4</div><div><div class="bar" style="width: var(--space-4);"></div></div><div class="px">16px</div></div>
    <div class="row"><div class="token">--space-5</div><div><div class="bar" style="width: var(--space-5);"></div></div><div class="px">20px</div></div>
    <div class="row"><div class="token">--space-6</div><div><div class="bar" style="width: var(--space-6);"></div></div><div class="px">24px</div></div>
    <div class="row"><div class="token">--space-8</div><div><div class="bar" style="width: var(--space-8);"></div></div><div class="px">32px</div></div>
    <div class="row"><div class="token">--space-10</div><div><div class="bar" style="width: var(--space-10);"></div></div><div class="px">40px</div></div>
    <div class="row"><div class="token">--space-12</div><div><div class="bar" style="width: var(--space-12);"></div></div><div class="px">48px</div></div>
    <div class="row"><div class="token">--space-16</div><div><div class="bar" style="width: var(--space-16);"></div></div><div class="px">64px</div></div>
  </div>
</body>
</html>
