<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Color: Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 10px; border: 1px solid var(--border-default); }
  .chip { width: 44px; height: 44px; border-radius: 8px; border: 1px solid var(--border-default); flex-shrink: 0; }
  .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .name { font-size: 12px; font-weight: 600; color: var(--fg2); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .role { font-size: 11px; color: var(--fg-eyebrow); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="row" style="background: var(--bg-app);">
        <div class="chip" style="background: var(--bg-app);"></div>
        <div class="meta"><div class="name">App background</div><div class="hex">#0F1728</div><div class="role">--bg-app</div></div>
      </div>
      <div class="row" style="background: var(--bg-titlebar);">
        <div class="chip" style="background: var(--bg-titlebar);"></div>
        <div class="meta"><div class="name">Title bar</div><div class="hex">#0D1626</div><div class="role">--bg-titlebar</div></div>
      </div>
      <div class="row" style="background: var(--bg-server-rail);">
        <div class="chip" style="background: var(--bg-server-rail);"></div>
        <div class="meta"><div class="name">Server rail</div><div class="hex">#142033</div><div class="role">--bg-server-rail</div></div>
      </div>
      <div class="row" style="background: var(--bg-channel-list);">
        <div class="chip" style="background: var(--bg-channel-list);"></div>
        <div class="meta"><div class="name">Channel sidebar</div><div class="hex">#1C2A43</div><div class="role">--bg-channel-list</div></div>
      </div>
      <div class="row" style="background: var(--bg-chat);">
        <div class="chip" style="background: var(--bg-chat);"></div>
        <div class="meta"><div class="name">Chat area</div><div class="hex">#111A2B</div><div class="role">--bg-chat</div></div>
      </div>
      <div class="row" style="background: var(--bg-card);">
        <div class="chip" style="background: var(--bg-card);"></div>
        <div class="meta"><div class="name">Card</div><div class="hex">#16233A</div><div class="role">--bg-card</div></div>
      </div>
      <div class="row" style="background: var(--bg-card-deep);">
        <div class="chip" style="background: var(--bg-card-deep);"></div>
        <div class="meta"><div class="name">Card deep / nested</div><div class="hex">#121D31</div><div class="role">--bg-card-deep</div></div>
      </div>
      <div class="row" style="background: var(--bg-input);">
        <div class="chip" style="background: var(--bg-input);"></div>
        <div class="meta"><div class="name">Input / composer</div><div class="hex">#142033</div><div class="role">--bg-input</div></div>
      </div>
    </div>
  </div>
</body>
</html>
