<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Channel List Item</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-channel-list); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .panel { background: var(--bg-channel-list); border-radius: var(--radius-lg); padding: 12px; }

  .group { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; color: var(--fg-eyebrow); padding: 8px 8px 6px; display: flex; justify-content: space-between; align-items: center; }

  .ch { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; color: var(--fg-channel-idle); font-size: 14px; font-weight: 500; cursor: pointer; }
  .ch:hover { background: var(--bg-muted); color: var(--fg2); }
  .ch.active { background: var(--bg-secondary); color: var(--fg1); }
  .ch.unread { color: var(--fg1); }
  .ch .hash { color: var(--fg-dim); width: 18px; text-align: center; font-weight: 400; }
  .ch.active .hash { color: var(--fg1); }
  .ch .pip { margin-left: auto; min-width: 18px; height: 18px; padding: 0 6px; border-radius: 999px; background: var(--notification-pip); color: #fff; font-size: 11px; font-weight: 700; display: grid; place-items: center; }
  .ch .lock { margin-left: auto; color: var(--fg-eyebrow); }

  .label { font-size: 11px; text-transform: uppercase; letter-spacing: .18em; color: var(--fg-eyebrow); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="label" style="padding: 0 12px;">Text channels</div>
      <div class="panel">
        <div class="group">general <span style="opacity:.6;">+</span></div>
        <div class="ch active"><span class="hash">#</span>announcements</div>
        <div class="ch unread"><span class="hash">#</span>general<span class="pip">3</span></div>
        <div class="ch"><span class="hash">#</span>off-topic</div>
        <div class="ch"><span class="hash">🔒</span>moderators<span class="lock">›</span></div>
      </div>
    </div>
    <div>
      <div class="label" style="padding: 0 12px;">Voice channels</div>
      <div class="panel">
        <div class="group">voice</div>
        <div class="ch unread"><span class="hash">🔊</span>Lounge</div>
        <div class="ch"><span class="hash">🔊</span>Music<span class="pip" style="background: var(--success-strong);">2</span></div>
        <div class="ch"><span class="hash">🔊</span>Standup</div>
      </div>
    </div>
  </div>
</body>
</html>
