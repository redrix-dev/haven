<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Haven — Color: Brand</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-app); color: var(--fg2); font-family: var(--font-sans); }
  .wrap { width: 700px; padding: 24px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { aspect-ratio: 1.5 / 1; border: 1px solid var(--border-default); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
  .swatch .meta { display: flex; flex-direction: column; gap: 2px; }
  .swatch .name { font-size: 11px; font-weight: 600; color: var(--fg2); }
  .swatch .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .swatch .role { font-size: 10px; color: rgba(255,255,255,.85); font-weight: 500; }
  .glow { position: relative; overflow: hidden; }
  .glow::after { content: ""; position: absolute; inset: -40% -40% auto auto; width: 220px; height: 180px; background: radial-gradient(circle, rgba(63,121,216,.45) 0%, transparent 65%); pointer-events: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="swatch glow" style="background: var(--haven-blue);">
        <div class="role">Primary CTA · active rail</div>
        <div class="meta"><div class="name" style="color:#fff;">Haven blue</div><div class="hex" style="color:rgba(255,255,255,.7);">#3F79D8</div></div>
      </div>
      <div class="swatch" style="background: var(--haven-blue-hover);">
        <div class="role" style="color:rgba(255,255,255,.85);">Hover / pressed</div>
        <div class="meta"><div class="name" style="color:#fff;">Blue hover</div><div class="hex" style="color:rgba(255,255,255,.7);">#325FAE</div></div>
      </div>
      <div class="swatch" style="background: var(--haven-blue-soft);">
        <div class="role" style="color:rgba(13,22,38,.85);">Focus ring · soft</div>
        <div class="meta"><div class="name" style="color:#0D1626;">Blue soft</div><div class="hex" style="color:#0D1626;">#5F8FDD</div></div>
      </div>
      <div class="swatch" style="background: var(--haven-blue-link);">
        <div class="role" style="color:rgba(13,22,38,.85);">Inline link on dark</div>
        <div class="meta"><div class="name" style="color:#0D1626;">Blue link</div><div class="hex" style="color:#0D1626;">#59B7FF</div></div>
      </div>
    </div>
  </div>
</body>
</html>
